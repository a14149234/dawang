<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 手机统一视口 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
<title>点击跳转</title>
<style>
* {
  margin:0; padding:0; box-sizing:border-box;
  -webkit-box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  tap-highlight-color:transparent;
}
html,body{
  width:100%; height:100%;
  font-family: -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;
  background:#f5f5f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 30px;
  padding: 20px;
}
/* 固定图片样式 */
.random-img {
  width: 100%;
  max-width: 320px;
  height: auto;
  border-radius: 16px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.15);
  object-fit: cover;
}
/* 跳转按钮 */
.jump-btn {
  padding: 18px 45px;
  background:#0066ff;
  color:#fff;
  font-size: 18px;
  border-radius: 50px;
  border: none;
  box-shadow: 0 4px 10px rgba(0,102,255,0.2);
}
.jump-btn:active {
  transform: scale(0.95);
}
</style>
</head>

<body>
  <!-- 这里放你自己的图片 -->
  <img class="random-img" src="https://p5.ssl.qhimgs1.com/t0110c5482a6fc9f475.jpg">

  <!-- 跳转按钮 -->
  <button class="jump-btn" onclick="window.open('https://www.instagram.com/tutu85996?igsh=MnU3anlsNG94enVl&utm_source=qr','_blank')">
    点击打开Instagram聊天
  </button>

</body>
</html>
