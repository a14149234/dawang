<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<!-- 手机端必加，保证所有手机显示一样 -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Instagram联系页</title>
<style>
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
  -webkit-box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
}

html,body{
  width:100%;
  height:100%;
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(135deg, #f0f4ff 0%, #d9e2ff 100%);
  display: flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding: 20px;
  text-align:center;
  position: relative; /* 修复底部文字定位 */
}

/* 大标题 */
.main-title{
  font-size: clamp(18px, 5vw, 24px); /* 响应式字体 */
  font-weight: bold;
  color: #e63946; /* 调整为更舒适的红色 */
  margin-bottom: 15px;
  line-height: 1.4;
}

/* 可复制说明文字 */
.desc{
  font-size: clamp(16px, 4vw, 18px);
  color: #0066ff;
  font-weight: bold;
  margin: 20px 0 30px;
  line-height: 1.6;
  cursor: pointer;
  padding: 15px 20px;
  border: 2px dashed #0066ff;
  border-radius: 12px;
  user-select: none;
  background-color: rgba(255, 255, 255, 0.8);
  transition: all 0.3s ease;
}
.desc:hover{
  background-color: rgba(255, 255, 255, 1);
  border-color: #0051cc;
}
.desc:active{
  opacity: 0.7;
  transform: scale(0.98);
}

/* 按钮 */
.btn{
  background:#0066ff;
  color:white;
  font-size: clamp(16px, 4vw, 18px);
  padding: 18px 50px;
  border-radius: 50px;
  border:none;
  box-shadow: 0 5px 15px rgba(0,102,255,0.2);
  margin: 10px 0 20px;
  cursor: pointer;
  transition: all 0.3s ease;
}

.btn:hover{
  background: #0051cc;
  box-shadow: 0 5px 20px rgba(0,102,255,0.3);
}
.btn:active{
  transform:scale(0.96);
}

/* 底部文字 */
.footer{
  font-size:12px;
  color:#999;
  position: absolute;
  bottom:20px;
}

/* 提示信息样式 */
.toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background-color: rgba(0,0,0,0.8);
  color: white;
  padding: 15px 25px;
  border-radius: 8px;
  font-size: 16px;
  z-index: 9999;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
}
</style>
</head>

<body>
  <!-- 提示框 -->
  <div class="toast" id="toast"></div>

  <!-- 1. 标题 -->
  <div class="main-title">通过Instagram搜索联系我的主账号</div>

  <!-- 2. 点击可复制的文字 -->
  <div class="desc" id="copyText">tutu85966</div>
  
  <!-- 引导说明 -->
  <div class="main-title">点击上方账号可直接复制</div>
  <div class="main-title">请先关注我再发送消息</div>

  <!-- 3. 跳转按钮 -->
  <button class="btn" onclick="openInstagram()">
    点击这里打开Instagram聊天
  </button>
  
  <div class="main-title">添加我时请主动告知你的位置，否则将不予回复</div>

  <!-- 底部文字 -->
  <div class="footer">© 2025 Instagram联系页</div>

<script>
// 显示提示信息
function showToast(message) {
  const toast = document.getElementById('toast');
  toast.innerText = message;
  toast.classList.add('show');
  
  setTimeout(() => {
    toast.classList.remove('show');
  }, 2000);
}

// 点击复制功能
document.getElementById('copyText').onclick = function(){
  const text = this.innerText;
  
  // 兼容旧版浏览器
  if (!navigator.clipboard) {
    const textArea = document.createElement('textarea');
    textArea.value = text;
    document.body.appendChild(textArea);
    textArea.select();
    document.execCommand('copy');
    document.body.removeChild(textArea);
    showToast('复制成功！');
    return;
  }
  
  navigator.clipboard.writeText(text)
    .then(() => {
      showToast('复制成功！');
    })
    .catch(err => {
      showToast('复制失败，请手动复制');
      console.error('复制失败:', err);
    });
}

// 打开Instagram链接
function openInstagram() {
  const url = 'https://www.instagram.com/tutu85996?igsh=MnU3anlsNG94enVl&utm_source=qr';
  window.open(url, '_blank');
  showToast('正在打开Instagram...');
}

// 页面加载完成提示
window.onload = function() {
  console.log('页面加载完成，可正常使用');
}
</script>

</body>
</html>
